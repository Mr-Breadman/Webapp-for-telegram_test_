<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Shop</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #main {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-weight: 400;
            color: var(--tg-theme-text-color);
        }
        p {
            font-weight: 200;
            color: var(--tg-theme-hint-color);
        }

        /* ========== Стили для формы ========== */
        #form {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 8px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            font-weight: 200;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color);
        }

        input::placeholder {
            color: var(--tg-theme-hint-color);
            opacity: 0.7;
        }

        button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 400;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
            width: 100%;
        }

        button:hover {
            opacity: 0.8;
        }

        img {
            max-width: 100%;
            height: auto;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>Онлайн магазин</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png" alt="Корзина">
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusantium ipsum magni, molestias.</p>

        <!-- ========== ФОРМА ========== -->
        <form id="form">
            <input type="text" placeholder="Имя" id="user_name" required>
            <input type="email" placeholder="Email" id="user_email" required>
            <input type="tel" placeholder="Телефон" id="user_phone" required>
            <button id="order">Оформить</button>
        </form>
        <!-- ============================ -->

        <!-- Кнопка "Купить" (оставил для истории, но теперь она не нужна) -->
        <!-- <button id="buy">Купить</button> -->
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;

        document.addEventListener('DOMContentLoaded', function() {
            const orderBtn = document.getElementById('order');
            const form = document.getElementById('form');

            // Если нужна кнопка "Купить" (удалил, но можно оставить)
            // const buyBtn = document.getElementById('buy');
            // buyBtn.addEventListener('click', function() {
            //     tg.sendData('Товар куплен!');
            //     tg.close();
            // });

            orderBtn.addEventListener('click', function(event) {
                event.preventDefault(); // Отключаем стандартную отправку формы

                // Получаем значения полей
                const name = document.getElementById('user_name').value.trim();
                const email = document.getElementById('user_email').value.trim();
                const phone = document.getElementById('user_phone').value.trim();

                // Проверка заполненности
                if (!name || !email || !phone) {
                    alert('Пожалуйста, заполните все поля!');
                    return;
                }

                // Формируем данные для отправки
                const orderData = {
                    name: name,
                    email: email,
                    phone: phone,
                    product: 'Товар из магазина'
                };

                // Отправляем данные боту
                tg.sendData(JSON.stringify(orderData));
                tg.close();
            });
        });
    </script>
</body>
</html>
